name: Validate verified activity scoring

on:
  pull_request:
    branches:
      - main
    paths:
      - 'api/rewards.js'
      - 'src/hooks/useGoals.ts'
      - 'src/hooks/usePrograms.ts'
      - 'supabase/migrations/20260620170000_014_verified_activity_and_challenge_scoring.sql'
      - 'supabase/tests/verified_activity_and_scoring.sql'
      - 'tests/verified-activity.test.js'
      - '.github/workflows/validate-verified-activity.yml'

permissions:
  contents: read

jobs:
  node-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run each Node test file
        run: |
          mkdir -p artifacts
          : > artifacts/node-test.log
          failed=0
          for test_file in tests/*.test.js; do
            echo "Running ${test_file}" | tee -a artifacts/node-test.log
            if ! node --test "${test_file}" >> artifacts/node-test.log 2>&1; then
              echo "FAILED_FILE=${test_file}" | tee -a artifacts/node-test.log
              failed=1
              break
            fi
          done
          cat artifacts/node-test.log
          exit ${failed}

      - name: Check API syntax
        if: success()
        run: node --check api/rewards.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verified-activity-node-diagnostics
          path: artifacts/node-test.log
          if-no-files-found: error

  sql-validation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Prepare disposable PostgreSQL schema
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
          DO $$ BEGIN CREATE ROLE anon NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE authenticated NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE service_role NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE OR REPLACE FUNCTION auth.role() RETURNS text LANGUAGE sql STABLE
          AS $$ SELECT current_setting('request.jwt.claim.role', true) $$;
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE
          AS $$ SELECT NULLIF(current_setting('request.jwt.claim.sub', true), '')::uuid $$;

          CREATE TABLE public.users (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            telegram_id bigint UNIQUE,
            username text,
            first_name text NOT NULL DEFAULT '',
            xp integer DEFAULT 0,
            level integer DEFAULT 1,
            xp_this_week integer DEFAULT 0,
            total_goals_completed integer DEFAULT 0,
            streak integer DEFAULT 0,
            longest_streak integer DEFAULT 0,
            streak_freeze_count integer DEFAULT 0,
            streak_freeze_pending_count integer DEFAULT 0
          );
          GRANT SELECT,INSERT,UPDATE,DELETE ON public.users TO anon,authenticated;

          CREATE TABLE public.goals (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            user_id uuid NOT NULL REFERENCES public.users(id) ON DELETE CASCADE,
            title text NOT NULL,
            type text NOT NULL DEFAULT 'daily',
            frequency text,
            active boolean DEFAULT true,
            paused boolean DEFAULT false,
            created_at timestamptz DEFAULT now()
          );
          GRANT SELECT,INSERT,UPDATE,DELETE ON public.goals TO anon,authenticated;

          CREATE TABLE public.goal_logs (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            goal_id uuid NOT NULL REFERENCES public.goals(id) ON DELETE CASCADE,
            user_id uuid NOT NULL REFERENCES public.users(id) ON DELETE CASCADE,
            status text NOT NULL,
            date date NOT NULL DEFAULT CURRENT_DATE,
            xp_earned integer NOT NULL DEFAULT 0,
            created_at timestamptz NOT NULL DEFAULT now()
          );
          GRANT SELECT,INSERT,UPDATE,DELETE ON public.goal_logs TO anon,authenticated;

          CREATE OR REPLACE FUNCTION public.update_user_streak(p_user_id uuid)
          RETURNS void LANGUAGE plpgsql SECURITY DEFINER SET search_path=public,pg_temp AS $$
          BEGIN
            UPDATE public.users
            SET streak=COALESCE(streak,0)+1,
                longest_streak=GREATEST(COALESCE(longest_streak,0),COALESCE(streak,0)+1)
            WHERE id=p_user_id;
          END $$;
          SQL

      - name: Apply backend migrations
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/migrations/20260620010000_012_atomic_running_program_completion.sql
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/migrations/20260620150000_013_challenges_backend_foundation.sql
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/migrations/20260620170000_014_verified_activity_and_challenge_scoring.sql

      - name: Run SQL scoring tests
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/verified_activity_and_scoring.sql
