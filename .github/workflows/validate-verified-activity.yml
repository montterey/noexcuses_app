name: Validate verified activity scoring

on:
  pull_request:
    branches:
      - main
    paths:
      - 'api/rewards.js'
      - 'api/challenges.js'
      - 'src/hooks/useGoals.ts'
      - 'src/hooks/usePrograms.ts'
      - 'supabase/migrations/20260620170000_014_verified_activity_and_challenge_scoring.sql'
      - 'supabase/migrations/20260620173000_015_once_goal_completion_hardening.sql'
      - 'supabase/migrations/20260620174500_016_lock_verified_activity_writes.sql'
      - 'supabase/tests/verified_activity_and_scoring.sql'
      - 'supabase/tests/once_goal_completion_hardening.sql'
      - 'tests/verified-activity.test.js'
      - 'tests/rewards-api.test.js'
      - '.github/workflows/validate-verified-activity.yml'

permissions:
  contents: read

jobs:
  node-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run each Node test file
        run: |
          mkdir -p artifacts
          : > artifacts/node-test.log
          failed=0
          for test_file in tests/*.test.js; do
            echo "Running ${test_file}" | tee -a artifacts/node-test.log
            if ! node --test "${test_file}" >> artifacts/node-test.log 2>&1; then
              echo "FAILED_FILE=${test_file}" | tee -a artifacts/node-test.log
              failed=1
              break
            fi
          done
          cat artifacts/node-test.log
          exit ${failed}

      - name: Check API syntax
        run: |
          node --check api/rewards.js
          node --check api/challenges.js

  sql-validation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Build zero-downtime migration split
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
          from pathlib import Path

          source_path = Path('supabase/migrations/20260620170000_014_verified_activity_and_challenge_scoring.sql')
          source = source_path.read_text(encoding='utf-8')

          start_marker = 'REVOKE INSERT,UPDATE,DELETE ON public.goal_logs FROM anon,authenticated;'
          end_marker = 'FOR EACH ROW EXECUTE FUNCTION public.protect_user_progress_fields();\n\n'
          start = source.index(start_marker)
          end = source.index(end_marker, start) + len(end_marker)

          additive = (
              source[:start]
              + '-- Legacy client write locking is enabled after production deployment by migration 016.\n\n'
              + source[end:]
          )
          additive = additive.replace(
              'REVOKE ALL ON FUNCTION public.protect_user_progress_fields() FROM PUBLIC,anon,authenticated;\n',
              '',
              1,
          )

          lock_sql = '''-- Apply only after PR #13 is merged and the production Vercel deployment is successful.
          -- This removes the legacy client write paths after the new API is live.
          REVOKE INSERT,UPDATE,DELETE ON public.goal_logs FROM anon,authenticated;
          REVOKE INSERT,UPDATE,DELETE ON public.user_programs FROM anon,authenticated;
          REVOKE INSERT,UPDATE,DELETE ON public.program_day_completions FROM anon,authenticated;
          GRANT SELECT ON public.goal_logs,public.user_programs,public.program_day_completions TO anon,authenticated;

          CREATE OR REPLACE FUNCTION public.protect_user_progress_fields()
          RETURNS trigger
          LANGUAGE plpgsql
          SET search_path=public,pg_temp
          AS $$
          BEGIN
            IF auth.role() IS DISTINCT FROM 'service_role' AND (
              NEW.xp IS DISTINCT FROM OLD.xp
              OR NEW.level IS DISTINCT FROM OLD.level
              OR NEW.xp_this_week IS DISTINCT FROM OLD.xp_this_week
              OR NEW.total_goals_completed IS DISTINCT FROM OLD.total_goals_completed
              OR NEW.streak IS DISTINCT FROM OLD.streak
              OR NEW.longest_streak IS DISTINCT FROM OLD.longest_streak
              OR NEW.streak_freeze_count IS DISTINCT FROM OLD.streak_freeze_count
              OR NEW.streak_freeze_pending_count IS DISTINCT FROM OLD.streak_freeze_pending_count
            ) THEN
              RAISE EXCEPTION 'progress fields are server managed' USING ERRCODE='42501';
            END IF;
            RETURN NEW;
          END $$;

          DROP TRIGGER IF EXISTS protect_user_progress_fields_trigger ON public.users;
          CREATE TRIGGER protect_user_progress_fields_trigger
          BEFORE UPDATE ON public.users
          FOR EACH ROW EXECUTE FUNCTION public.protect_user_progress_fields();

          REVOKE ALL ON FUNCTION public.protect_user_progress_fields()
          FROM PUBLIC,anon,authenticated;
          '''

          Path('artifacts/20260620170000_014_verified_activity_and_challenge_scoring.sql').write_text(additive, encoding='utf-8')
          Path('artifacts/20260620174500_016_lock_verified_activity_writes.sql').write_text(lock_sql, encoding='utf-8')
          PY

      - name: Prepare disposable PostgreSQL schema
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
          DO $$ BEGIN CREATE ROLE anon NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE authenticated NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE service_role NOLOGIN; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE OR REPLACE FUNCTION auth.role() RETURNS text LANGUAGE sql STABLE
          AS $$ SELECT current_setting('request.jwt.claim.role', true) $$;
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE
          AS $$ SELECT NULLIF(current_setting('request.jwt.claim.sub', true), '')::uuid $$;

          CREATE TABLE public.users (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            telegram_id bigint UNIQUE,
            username text,
            first_name text NOT NULL DEFAULT '',
            xp integer DEFAULT 0,
            level integer DEFAULT 1,
            xp_this_week integer DEFAULT 0,
            total_goals_completed integer DEFAULT 0,
            streak integer DEFAULT 0,
            longest_streak integer DEFAULT 0,
            streak_freeze_count integer DEFAULT 0,
            streak_freeze_pending_count integer DEFAULT 0
          );
          GRANT SELECT,INSERT,UPDATE,DELETE ON public.users TO anon,authenticated;

          CREATE TABLE public.goals (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            user_id uuid NOT NULL REFERENCES public.users(id) ON DELETE CASCADE,
            title text NOT NULL,
            type text NOT NULL DEFAULT 'daily',
            frequency text,
            active boolean DEFAULT true,
            paused boolean DEFAULT false,
            created_at timestamptz DEFAULT now()
          );
          GRANT SELECT,INSERT,UPDATE,DELETE ON public.goals TO anon,authenticated;

          CREATE TABLE public.goal_logs (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            goal_id uuid NOT NULL REFERENCES public.goals(id) ON DELETE CASCADE,
            user_id uuid NOT NULL REFERENCES public.users(id) ON DELETE CASCADE,
            status text NOT NULL,
            date date NOT NULL DEFAULT CURRENT_DATE,
            xp_earned integer NOT NULL DEFAULT 0,
            created_at timestamptz NOT NULL DEFAULT now()
          );
          GRANT SELECT,INSERT,UPDATE,DELETE ON public.goal_logs TO anon,authenticated;

          CREATE OR REPLACE FUNCTION public.update_user_streak(p_user_id uuid)
          RETURNS void LANGUAGE plpgsql SECURITY DEFINER SET search_path=public,pg_temp AS $$
          BEGIN
            UPDATE public.users
            SET streak=COALESCE(streak,0)+1,
                longest_streak=GREATEST(COALESCE(longest_streak,0),COALESCE(streak,0)+1)
            WHERE id=p_user_id;
          END $$;
          SQL

      - name: Apply additive migrations before deploy
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/migrations/20260620010000_012_atomic_running_program_completion.sql
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/migrations/20260620150000_013_challenges_backend_foundation.sql
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f artifacts/20260620170000_014_verified_activity_and_challenge_scoring.sql
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/migrations/20260620173000_015_once_goal_completion_hardening.sql

      - name: Verify legacy writes remain available before deploy
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          SELECT has_table_privilege('authenticated','public.goal_logs','INSERT');
          SELECT has_table_privilege('authenticated','public.user_programs','UPDATE');
          SQL

      - name: Apply post-deploy write lock
        run: psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f artifacts/20260620174500_016_lock_verified_activity_writes.sql

      - name: Run SQL scoring and hardening tests
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/verified_activity_and_scoring.sql
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -f supabase/tests/once_goal_completion_hardening.sql

      - name: Verify split shape
        run: |
          ! grep -q 'REVOKE INSERT,UPDATE,DELETE ON public.goal_logs' artifacts/20260620170000_014_verified_activity_and_challenge_scoring.sql
          grep -q 'REVOKE INSERT,UPDATE,DELETE ON public.goal_logs' artifacts/20260620174500_016_lock_verified_activity_writes.sql

      - uses: actions/upload-artifact@v4
        with:
          name: zero-downtime-activity-migrations
          path: |
            artifacts/20260620170000_014_verified_activity_and_challenge_scoring.sql
            artifacts/20260620174500_016_lock_verified_activity_writes.sql
          if-no-files-found: error
