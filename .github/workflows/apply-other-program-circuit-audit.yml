name: Apply other program circuit audit

on:
  push:
    branches:
      - fix/fitness-circuit-order

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply focused program queue audit
        run: |
          python3 - <<'PY'
          from pathlib import Path

          component = Path('src/components/ProgramDetail.tsx')
          source = component.read_text(encoding='utf-8')

          old = """  const programDay = dayContent?.day_number || currentDay;
            const shouldInterleaveFitnessSets = programCode === 'fitness' && programDay >= 5;
            const queue = dayContent
              ? buildWorkoutQueue(dayContent.exercises, shouldInterleaveFitnessSets)
              : [];"""

          new = """  const programDay = dayContent?.day_number || currentDay;
            const shouldInterleaveSets =
              (programCode === 'fitness' && programDay >= 5)
              || programCode === 'running';
            const queue = dayContent
              ? buildWorkoutQueue(dayContent.exercises, shouldInterleaveSets)
              : [];"""

          if old not in source:
            raise SystemExit('Expected program queue selector was not found')

          component.write_text(source.replace(old, new, 1), encoding='utf-8')

          test_path = Path('tests/fitness-circuit-order.test.js')
          test_path.write_text("""import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';
          import test from 'node:test';

          const source = await readFile(
            new URL('../src/components/ProgramDetail.tsx', import.meta.url),
            'utf8'
          );

          test('fitness days 5-30 use circuit ordering', () => {
            assert.match(
              source,
              /programCode === 'fitness' && programDay >= 5/
            );
            assert.match(
              source,
              /buildWorkoutQueue\(dayContent\.exercises, shouldInterleaveSets\)/
            );
          });

          test('running repeated intervals also use circuit ordering', () => {
            assert.match(source, /\|\| programCode === 'running'/);
          });

          test('sleep and reading keep single-task sequential behavior', () => {
            const selectorStart = source.indexOf('const shouldInterleaveSets =');
            const selectorEnd = source.indexOf('const queue = dayContent', selectorStart);
            const selector = source.slice(selectorStart, selectorEnd);

            assert.doesNotMatch(selector, /programCode === 'sleep'/);
            assert.doesNotMatch(selector, /programCode === 'reading'/);
            assert.match(source, /exercise\.type === 'task'[\s\S]*?\? 1/);
          });

          test('circuit queue alternates exercises before moving to the next set', () => {
            const builderStart = source.indexOf('function buildWorkoutQueue');
            const builderEnd = source.indexOf('function normalizeExerciseName');
            const builder = source.slice(builderStart, builderEnd);
            const outerSetLoop = builder.indexOf('for (let set = 1; set <= maxSets; set++)');
            const innerExerciseLoop = builder.indexOf(
              'for (const { exercise, totalSets } of exercisesWithSets)'
            );

            assert.notEqual(outerSetLoop, -1);
            assert.notEqual(innerExerciseLoop, -1);
            assert.ok(outerSetLoop < innerExerciseLoop);
          });

          test('fitness days 1-4 keep the existing sequential order', () => {
            assert.match(source, /if \(!interleaveSets\)/);
          });
          """, encoding='utf-8')

          Path('.github/workflows/apply-other-program-circuit-audit.yml').unlink()
          PY

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint changed files
        run: npx eslint src/components/ProgramDetail.tsx tests/fitness-circuit-order.test.js

      - name: Run tests
        run: npm test

      - name: Commit tested audit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ProgramDetail.tsx tests/fitness-circuit-order.test.js .github/workflows/apply-other-program-circuit-audit.yml
          git commit -m "Audit circuit ordering across all programs"
          git push origin HEAD:fix/fitness-circuit-order
