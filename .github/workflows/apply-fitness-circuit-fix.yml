name: Apply fitness circuit order fix

on:
  push:
    branches:
      - fix/fitness-circuit-order

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply focused source patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/components/ProgramDetail.tsx')
          source = path.read_text(encoding='utf-8')

          old_builder = """function buildWorkoutQueue(exercises: ProgramExercise[]): WorkoutQueueItem[] {
            const queue: WorkoutQueueItem[] = [];

            for (const exercise of exercises) {
              const isTask = exercise.type === 'task';

              const totalSets = isTask
                ? 1
                : Math.max(1, Number(exercise.sets) || 1);

              for (let set = 1; set <= totalSets; set++) {
                queue.push({
                  ...exercise,
                  type: exercise.type || 'exercise',
                  sets: totalSets,
                  setNumber: set,
                  totalSets,
                });
              }
            }

            return queue;
          }
          """

          new_builder = """function getTotalSets(exercise: ProgramExercise) {
            return exercise.type === 'task'
              ? 1
              : Math.max(1, Number(exercise.sets) || 1);
          }

          function buildWorkoutQueue(
            exercises: ProgramExercise[],
            interleaveSets = false
          ): WorkoutQueueItem[] {
            const queue: WorkoutQueueItem[] = [];

            if (!interleaveSets) {
              for (const exercise of exercises) {
                const totalSets = getTotalSets(exercise);

                for (let set = 1; set <= totalSets; set++) {
                  queue.push({
                    ...exercise,
                    type: exercise.type || 'exercise',
                    sets: totalSets,
                    setNumber: set,
                    totalSets,
                  });
                }
              }

              return queue;
            }

            const exercisesWithSets = exercises.map((exercise) => ({
              exercise,
              totalSets: getTotalSets(exercise),
            }));
            const maxSets = Math.max(
              0,
              ...exercisesWithSets.map(({ totalSets }) => totalSets)
            );

            for (let set = 1; set <= maxSets; set++) {
              for (const { exercise, totalSets } of exercisesWithSets) {
                if (set > totalSets) continue;

                queue.push({
                  ...exercise,
                  type: exercise.type || 'exercise',
                  sets: totalSets,
                  setNumber: set,
                  totalSets,
                });
              }
            }

            return queue;
          }
          """

          if old_builder not in source:
            raise SystemExit('Expected workout queue builder was not found')
          source = source.replace(old_builder, new_builder, 1)

          old_queue = "  const queue = dayContent ? buildWorkoutQueue(dayContent.exercises) : [];"
          new_queue = """  const programDay = dayContent?.day_number || currentDay;
            const shouldInterleaveFitnessSets = programCode === 'fitness' && programDay >= 5;
            const queue = dayContent
              ? buildWorkoutQueue(dayContent.exercises, shouldInterleaveFitnessSets)
              : [];"""

          if old_queue not in source:
            raise SystemExit('Expected queue construction was not found')
          source = source.replace(old_queue, new_queue, 1)
          path.write_text(source, encoding='utf-8')

          test_path = Path('tests/fitness-circuit-order.test.js')
          test_path.write_text("""import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';
          import test from 'node:test';

          const source = await readFile(
            new URL('../src/components/ProgramDetail.tsx', import.meta.url),
            'utf8'
          );

          test('fitness days 5-30 use circuit ordering', () => {
            assert.match(
              source,
              /programCode === 'fitness' && programDay >= 5/
            );
            assert.match(
              source,
              /buildWorkoutQueue\(dayContent\.exercises, shouldInterleaveFitnessSets\)/
            );
          });

          test('circuit queue alternates exercises before moving to the next set', () => {
            const builderStart = source.indexOf('function buildWorkoutQueue');
            const builderEnd = source.indexOf('function normalizeExerciseName');
            const builder = source.slice(builderStart, builderEnd);
            const outerSetLoop = builder.indexOf('for (let set = 1; set <= maxSets; set++)');
            const innerExerciseLoop = builder.indexOf(
              'for (const { exercise, totalSets } of exercisesWithSets)'
            );

            assert.notEqual(outerSetLoop, -1);
            assert.notEqual(innerExerciseLoop, -1);
            assert.ok(outerSetLoop < innerExerciseLoop);
          });

          test('days 1-4 keep the existing sequential order', () => {
            assert.match(source, /if \(!interleaveSets\)/);
          });
          """, encoding='utf-8')

          Path('.github/workflows/apply-fitness-circuit-fix.yml').unlink()
          PY

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint changed files
        run: npx eslint src/components/ProgramDetail.tsx tests/fitness-circuit-order.test.js

      - name: Run tests
        run: npm test

      - name: Commit tested fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ProgramDetail.tsx tests/fitness-circuit-order.test.js .github/workflows/apply-fitness-circuit-fix.yml
          git commit -m "Interleave fitness sets from day 5"
          git push origin HEAD:fix/fitness-circuit-order
